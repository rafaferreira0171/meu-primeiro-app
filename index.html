<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Planner Varejo Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<h1>Dashboard Varejo</h1>

<input type="file" id="excel-input" />

<div>
<h3>Total Vendas: <span id="total-sales">0</span></h3>
<h3>Ticket Médio: <span id="avg-ticket">0</span></h3>
<h3>Peças por Atendimento: <span id="items-per-service">0</span></h3>
</div>

<h2>Ranking de Lojas</h2>
<table border="1">
<thead>
<tr>
<th>Loja</th>
<th>Vendas</th>
</tr>
</thead>
<tbody id="ranking-body"></tbody>
</table>

<h2>Gráfico de Vendas</h2>
<canvas id="sales-chart"></canvas>

<script src="app.js"></script>

</body>
</html>
